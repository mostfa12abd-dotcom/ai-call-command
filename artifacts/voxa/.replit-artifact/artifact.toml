kind = "web"
previewPath = "/"
title = "Voxa AI"
version = "1.0.0"
id = "artifacts/voxa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21419

[services.development]
run = "pnpm --filter @workspace/voxa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voxa", "run", "build" ]
publicDir = "artifacts/voxa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21419"
BASE_PATH = "/"
